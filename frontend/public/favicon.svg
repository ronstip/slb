<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Outer wave rings -->
  <circle cx="20" cy="20" r="18" fill="none" stroke="#d4d4d8" stroke-width="1.5"/>
  <circle cx="20" cy="20" r="14" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
  <circle cx="20" cy="20" r="10" fill="none" stroke="#71717a" stroke-width="1.5"/>
  <!-- Satellite nodes -->
  <circle cx="28" cy="12" r="2" fill="#f97316"/>
  <circle cx="32" cy="24" r="2" fill="#22c55e"/>
  <circle cx="12" cy="28" r="2" fill="#a855f7"/>
  <!-- Connection lines -->
  <line x1="20" y1="20" x2="28" y2="12" stroke="#a1a1aa" stroke-width="1"/>
  <line x1="20" y1="20" x2="32" y2="24" stroke="#a1a1aa" stroke-width="1"/>
  <line x1="20" y1="20" x2="12" y2="28" stroke="#a1a1aa" stroke-width="1"/>
  <!-- Center node -->
  <circle cx="20" cy="20" r="6" fill="#c2410c"/>
</svg>
