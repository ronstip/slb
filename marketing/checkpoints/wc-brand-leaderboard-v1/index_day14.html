<!-- days 1–14 board (true as of Wed 24 Jun 2026) — B · Podium + Chase / C · The Race -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup · Brand Exposure Leaderboard · Days 1–14</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..600&family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter+Tight:wght@400..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet" />
  <script src="./data_day14.js?v=1"></script>
  <script src="./logos.js?v=2"></script>
  <script src="./image-slot.js?v=2"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #ECE8DF; }
    #root { height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="./parts.jsx?v=2"></script>
  <script type="text/babel" src="./board-podium.jsx?v=2"></script>
  <script type="text/babel" src="./board-race.jsx?v=2"></script>
  <script type="text/babel" src="./design-canvas.jsx?v=2"></script>
  <script type="text/babel" src="./tweaks-panel.jsx?v=2"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "format": "Portrait 4:5",
      "brandCount": 12,
      "dayPhoto": false,
      "event": "Opening run",
      "segment": "All brands",
      "matchday": "Days 1–14",
      "date": "Wed 24 Jun 2026"
    }/*EDITMODE-END*/;

    function Mount() {
      const { DesignCanvas, DCSection, DCArtboard, TweaksPanel, TweakSection, TweakRadio, TweakSlider, TweakToggle, TweakText, useTweaks } = window;
      const BoardPodium = window.BoardPodium;
      const BoardRace = window.BoardRace;

      function App() {
        const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
        const H = t.format === 'Square 1:1' ? 1080 : 1350;
        const base = window.WC_DATA;
        const data = {
          ...base,
          matchday: t.matchday,
          dateLabel: t.date,
          scope: { event: t.event, segment: t.segment },
          moment: t.dayPhoto ? base.moment : null,
          brands: [...base.brands].sort((a, b) => b.sov - a.sov).slice(0, t.brandCount),
        };
        return (
          <React.Fragment>
            <DesignCanvas>
              <DCSection id="dirs" title="World Cup · Brand Exposure · Days 1–14" subtitle={`Cumulative leaderboard for X · 1080×${H} · pick a direction`}>
                <DCArtboard id="podium" label="B · Podium + Chase" width={1080} height={H}><BoardPodium data={data} height={H} /></DCArtboard>
                <DCArtboard id="race" label="C · The Race" width={1080} height={H}><BoardRace data={data} height={H} /></DCArtboard>
              </DCSection>
            </DesignCanvas>
            <TweaksPanel>
              <TweakSection label="Canvas" />
              <TweakRadio label="Format" value={t.format} options={['Portrait 4:5', 'Square 1:1']} onChange={(v) => setTweak('format', v)} />
              <TweakSlider label="Brands shown" value={t.brandCount} min={5} max={12} step={1} onChange={(v) => setTweak('brandCount', v)} />
              <TweakToggle label="Day photo" value={t.dayPhoto} onChange={(v) => setTweak('dayPhoto', v)} />
              <TweakSection label="Scope" />
              <TweakText label="Event" value={t.event} onChange={(v) => setTweak('event', v)} />
              <TweakText label="Segment" value={t.segment} onChange={(v) => setTweak('segment', v)} />
              <TweakSection label="Day" />
              <TweakText label="Matchday" value={t.matchday} onChange={(v) => setTweak('matchday', v)} />
              <TweakText label="Date" value={t.date} onChange={(v) => setTweak('date', v)} />
            </TweaksPanel>
          </React.Fragment>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    }
    if (document.readyState === 'loading') {
      window.addEventListener('DOMContentLoaded', Mount);
    } else {
      Mount();
    }
  </script>
</body>
</html>
