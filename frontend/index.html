    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://scolto.com/#organization",
            "name": "Scolto",
            "url": "https://scolto.com/",
            "logo": "https://scolto.com/favicon.svg"
          },
          {
            "@type": "WebSite",
            "@id": "https://scolto.com/#website",
            "url": "https://scolto.com/",
            "name": "Scolto",
            "publisher": { "@id": "https://scolto.com/#organization" },
            "inLanguage": "en"
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://scolto.com/#software",
            "name": "Scolto",
            "url": "https://scolto.com/",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "description": "Scolto deploys senior AI analysts for social listening, trend detection, campaign tracking, and competitive intelligence.",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <script>
      // Prevent flash of wrong theme/accent on load
      (function () {
        try {
          var t = localStorage.getItem('sl-theme') || 'system';
          var isDark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');

          var accent = localStorage.getItem('sl-accent-color');
          if (accent) document.documentElement.style.setProperty('--color-accent-vibrant', accent);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
