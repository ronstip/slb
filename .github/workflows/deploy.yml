name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: social-listening-pl
  GCP_REGION: us-central1

jobs:
  # ──────────────── E2E Smoke Tests (gate) ────────────────
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci

      # Smoke build skips SEO prerender (DISABLE_PRERENDER) so the gate never
      # touches puppeteer/Chromium - keeps the gate fast and reliable.
      - name: Build frontend (dev mode - no Firebase)
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ''
          DISABLE_PRERENDER: 'true'
        run: npx vite build

      - name: Install E2E deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        working-directory: e2e
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ──────────────── Frontend ────────────────
  deploy-frontend:
    needs: e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Headroom: this job downloads Chromium for SEO prerender, which can be
    # slow on a cache miss. Cached after the first successful run.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci

      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Puppeteer Chromium (prerender)
        working-directory: frontend
        run: for i in 1 2 3; do npx puppeteer browsers install chrome && break || sleep 10; done

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          # GA4 Measurement ID is a public value (ships in the bundle), so it's
          # a literal here rather than a secret - guarantees the build never
          # silently ships without analytics if a secret is forgotten.
          VITE_GA_MEASUREMENT_ID: G-764Y77BXL7
          # Source-map upload (vite plugin runs only when the auth token is set)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: social-listening-pl

  # ──────────────── Backend API ────────────────
  deploy-api:
    needs: e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push API image
        run: |
          gcloud builds submit \
            --config cloudbuild-api.yaml \
            --substitutions _TAG=gcr.io/$GCP_PROJECT_ID/sl-api:${{ github.sha }} \
            --timeout 600 .

      - name: Deploy API to Cloud Run
        run: |
          API_URL=$(gcloud run services describe sl-api --region=$GCP_REGION --format='value(status.url)' 2>/dev/null || echo "")
          WORKER_URL=$(gcloud run services describe sl-worker --region=$GCP_REGION --format='value(status.url)' 2>/dev/null || echo "")
          RENDER_URL=$(gcloud run services describe sl-render --region=$GCP_REGION --format='value(status.url)' 2>/dev/null || echo "")
          gcloud run deploy sl-api \
            --image gcr.io/$GCP_PROJECT_ID/sl-api:${{ github.sha }} \
            --region $GCP_REGION \
            --platform managed \
            --service-account sl-api@$GCP_PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars "^||^ENVIRONMENT=production||GCP_PROJECT_ID=$GCP_PROJECT_ID||GCP_REGION=$GCP_REGION||GOOGLE_GENAI_USE_VERTEXAI=TRUE||GOOGLE_CLOUD_PROJECT=$GCP_PROJECT_ID||GOOGLE_CLOUD_LOCATION=global||CORS_ORIGINS=https://scolto.com,https://www.scolto.com,https://social-listening-pl.web.app,https://social-listening-pl.firebaseapp.com||FRONTEND_URL=https://scolto.com||WORKER_SERVICE_URL=$WORKER_URL||CLOUD_TASKS_SERVICE_ACCOUNT=sl-api@$GCP_PROJECT_ID.iam.gserviceaccount.com||RENDER_SERVICE_URL=$RENDER_URL||RENDER_SERVICE_TOKEN=${{ secrets.RENDER_SERVICE_TOKEN }}||ALERT_RENDER_SECRET=${{ secrets.ALERT_RENDER_SECRET }}||SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}||DASHBOARD_SERVER_AGG=true||SIGNUP_GATE=entitlements||ALLOWED_EMAILS=${{ secrets.ALLOWED_EMAILS }}||SUPER_ADMIN_EMAILS=${{ secrets.SUPER_ADMIN_EMAILS }}||VETRIC_API_KEY_TWITTER=${{ secrets.VETRIC_API_KEY_TWITTER }}||VETRIC_API_KEY_INSTAGRAM=${{ secrets.VETRIC_API_KEY_INSTAGRAM }}||VETRIC_API_KEY_TIKTOK=${{ secrets.VETRIC_API_KEY_TIKTOK }}||HIKERAPI_API_KEY=${{ secrets.HIKERAPI_API_KEY }}||SENTRY_DSN=${{ secrets.SENTRY_DSN }}||SENTRY_ENVIRONMENT=production||SENTRY_RELEASE=${{ github.sha }}" \
            --min-instances 0 \
            --max-instances 10 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 3600 \
            --concurrency 80 \
            --port 8080 \
            --allow-unauthenticated \
            --quiet

  # ──────────────── Worker ────────────────
  deploy-worker:
    needs: e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push Worker image
        run: |
          gcloud builds submit \
            --config cloudbuild-worker.yaml \
            --substitutions _TAG=gcr.io/$GCP_PROJECT_ID/sl-worker:${{ github.sha }} \
            --timeout 600 .

      - name: Deploy Worker to Cloud Run
        run: |
          API_URL=$(gcloud run services describe sl-api --region=$GCP_REGION --format='value(status.url)' 2>/dev/null || echo "")
          RENDER_URL=$(gcloud run services describe sl-render --region=$GCP_REGION --format='value(status.url)' 2>/dev/null || echo "")
          gcloud run deploy sl-worker \
            --image gcr.io/$GCP_PROJECT_ID/sl-worker:${{ github.sha }} \
            --region $GCP_REGION \
            --platform managed \
            --service-account sl-worker@$GCP_PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars "^||^ENVIRONMENT=production||GCP_PROJECT_ID=$GCP_PROJECT_ID||GCP_REGION=$GCP_REGION||GOOGLE_GENAI_USE_VERTEXAI=TRUE||GOOGLE_CLOUD_PROJECT=$GCP_PROJECT_ID||GOOGLE_CLOUD_LOCATION=global||API_SERVICE_URL=$API_URL||CLOUD_TASKS_SERVICE_ACCOUNT=sl-api@$GCP_PROJECT_ID.iam.gserviceaccount.com||RENDER_SERVICE_URL=$RENDER_URL||RENDER_SERVICE_TOKEN=${{ secrets.RENDER_SERVICE_TOKEN }}||ALERT_RENDER_SECRET=${{ secrets.ALERT_RENDER_SECRET }}||SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}||BRIGHTDATA_API_TOKEN=${{ secrets.BRIGHTDATA_API_TOKEN }}||ENRICHMENT_MODEL=gemini-3.1-flash-lite-preview||ENRICHMENT_VIDEO_FPS=0.5||ENRICHMENT_VIDEO_END_OFFSET=40s||ENRICHMENT_MAX_OUTPUT_TOKENS=4096||APIFY_API_TOKEN=${{ secrets.APIFY_API_TOKEN }}||APIFY_ACTOR_INSTAGRAM=apidojo/instagram-hashtag-scraper||APIFY_ACTOR_INSTAGRAM_POST=apify/instagram-scraper||APIFY_ACTOR_FACEBOOK=scrapeforge/facebook-search-posts||APIFY_ACTOR_FACEBOOK_PAGE=apify/facebook-posts-scraper||APIFY_ACTOR_FACEBOOK_GROUP=apify/facebook-groups-scraper||APIFY_ACTOR_TIKTOK=clockworks/tiktok-scraper||DEFAULT_VENDOR_INSTAGRAM=apify||DEFAULT_VENDOR_FACEBOOK=apify||DEFAULT_VENDOR_TIKTOK=apify||X_API_BEARER_TOKEN=${{ secrets.X_API_BEARER_TOKEN }}||VETRIC_API_KEY_TWITTER=${{ secrets.VETRIC_API_KEY_TWITTER }}||VETRIC_API_KEY_INSTAGRAM=${{ secrets.VETRIC_API_KEY_INSTAGRAM }}||VETRIC_API_KEY_TIKTOK=${{ secrets.VETRIC_API_KEY_TIKTOK }}||HIKERAPI_API_KEY=${{ secrets.HIKERAPI_API_KEY }}||SENTRY_DSN=${{ secrets.SENTRY_DSN }}||SENTRY_ENVIRONMENT=production||SENTRY_RELEASE=${{ github.sha }}" \
            --min-instances 0 \
            --max-instances 5 \
            --memory 4Gi \
            --cpu 4 \
            --timeout 3600 \
            --concurrency 1 \
            --port 8080 \
            --no-allow-unauthenticated \
            --quiet

  # ──────────────── Render service (headless widget → PNG) ────────────────
  deploy-render:
    needs: e2e-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & deploy render service
        run: |
          gcloud builds submit render/ \
            --tag gcr.io/$GCP_PROJECT_ID/sl-render:${{ github.sha }} \
            --timeout 600
          gcloud run deploy sl-render \
            --image gcr.io/$GCP_PROJECT_ID/sl-render:${{ github.sha }} \
            --region $GCP_REGION \
            --platform managed \
            --service-account sl-worker@$GCP_PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars "RENDER_SERVICE_TOKEN=${{ secrets.RENDER_SERVICE_TOKEN }}" \
            --min-instances 0 \
            --max-instances 3 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 120 \
            --concurrency 2 \
            --port 8080 \
            --allow-unauthenticated \
            --quiet
