<!-- X post · "Most views per post" · Hisense efficiency · 1080×1350 · matches boards B/C -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Most views per post · Hisense · World Cup 2026</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..600&family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter+Tight:wght@400..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet" />
  <script src="./data_day11.js?v=1"></script>
  <script src="./logos.js?v=2"></script>
  <script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>
  <script type="text/babel" src="./parts.jsx?v=2"></script>
  <style>
    html, body { margin: 0; min-height: 100%; background: #2A2A2E; }
    #root { display: grid; place-items: center; padding: 40px 40px 96px; min-height: 100vh; box-sizing: border-box; }
    #dl-btn {
      position: fixed; top: 24px; right: 24px; z-index: 50;
      font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; font-weight: 600;
      letter-spacing: 0.04em; color: #fff; background: #C25E3F; border: none;
      padding: 12px 20px; border-radius: 999px; cursor: pointer;
      box-shadow: 0 6px 20px -6px rgba(0,0,0,0.6);
    }
    #dl-btn:hover { background: #D97757; }
    #dl-btn:disabled { opacity: 0.6; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    function Mount() {
      const C = window.WC_C, F = window.WC_FONT;
      const { WCEyebrow: Eyebrow, WCMark: Mark, WCEmblem: Emblem, WCBrandTile: Tile, WCMove: Move, WCDateline: Dateline } = window;
      const D = window.WC_DATA;
      const hisense = D.brands.find(b => b.name === 'Hisense');

      // Proof: views per post (col 2 of the source table). The number the
      // leaderboard never shows — Hisense towers over the share-of-voice giants.
      const BARS = [
        { name: 'Hisense',        v: 116.4, leader: true },
        { name: 'Everyone (avg)', v: 46.3 },
        { name: 'adidas · #1 SoV', v: 28.9 },
      ];
      const MAX = 116.4;

      function RaceBar({ name, v, leader }) {
        const pct = (v / MAX) * 100;
        const fill = leader
          ? `linear-gradient(90deg, ${C.orangeDeep}, ${C.orange})`
          : `linear-gradient(90deg, ${C.ink}, ${C.slate})`;
        return (
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <span style={{ width: 178, fontFamily: F.sans, fontWeight: leader ? 700 : 500, fontSize: 18,
              letterSpacing: '-0.01em', color: leader ? C.ink : C.muted, flexShrink: 0 }}>{name}</span>
            <div style={{ flex: 1, height: leader ? 40 : 30, background: 'rgba(26,23,20,0.05)', borderRadius: 999, position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: pct + '%', background: fill,
                borderRadius: 999, boxShadow: leader ? '0 4px 14px -6px rgba(217,119,87,0.6)' : 'none' }} />
            </div>
            <span style={{ width: 104, textAlign: 'right', flexShrink: 0, fontFamily: F.serif,
              fontWeight: leader ? 500 : 400, fontSize: leader ? 34 : 26, color: leader ? C.orangeDeep : C.ink,
              letterSpacing: '-0.03em', fontVariantNumeric: 'tabular-nums' }}>{v.toFixed(1)}<span style={{ fontSize: 16, color: C.muted }}>K</span></span>
          </div>
        );
      }

      function Reason({ n, children }) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', gap: 18 }}>
            <span style={{ flexShrink: 0, width: 44, height: 44, borderRadius: 999, background: '#FFFFFF',
              border: `1.5px solid ${C.orange}`, color: C.orangeDeep, display: 'grid', placeItems: 'center',
              fontFamily: F.serif, fontWeight: 500, fontSize: 22 }}>{n}</span>
            <span style={{ fontFamily: F.sans, fontWeight: 600, fontSize: 27, color: C.ink, letterSpacing: '-0.015em', lineHeight: 1.15 }}>{children}</span>
          </div>
        );
      }
      const Hot = ({ children }) => <span style={{ color: C.orangeDeep, fontWeight: 700 }}>{children}</span>;

      function Card() {
        return (
          <div id="card" style={{ width: 1080, height: 1350, boxSizing: 'border-box', background: C.cream, position: 'relative',
            overflow: 'hidden', fontFamily: F.sans, color: C.ink, display: 'flex', flexDirection: 'column',
            padding: '54px 60px 44px', boxShadow: '0 30px 90px rgba(0,0,0,0.45)' }}>

            {/* house radial glow */}
            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(120% 55% at 18% 4%, rgba(217,119,87,0.13) 0%, rgba(217,119,87,0.04) 42%, transparent 72%)', pointerEvents: 'none' }} />

            {/* oversized WC emblem, top-right (house signature) */}
            <div style={{ position: 'absolute', top: 34, right: 52, zIndex: 3 }}><Emblem size={150} /></div>

            {/* faint Scolto watermark, bottom-right */}
            <div style={{ position: 'absolute', right: -110, bottom: -120, opacity: 0.05, transform: 'rotate(-8deg)' }}>
              <Mark size={560} stroke={C.ink} dot={C.orange} />
            </div>

            {/* masthead */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, position: 'relative' }}>
              <Mark size={38} />
              <span style={{ fontFamily: F.serif, fontStyle: 'italic', fontWeight: 400, fontSize: 32, letterSpacing: '-0.02em', color: C.ink }}>Scolto</span>
            </div>

            {/* title band */}
            <div style={{ marginTop: 34, position: 'relative' }}>
              <Dateline matchday={D.matchday} dateLabel={D.dateLabel} align="left" size={15.5} />
              <div style={{ fontFamily: F.display, fontWeight: 500, fontSize: 88, lineHeight: 0.94, letterSpacing: '-0.04em', color: C.ink, marginTop: 16 }}>
                Most views<br />per post
              </div>
              <div style={{ fontFamily: F.serif, fontWeight: 300, fontSize: 24, lineHeight: 1.3, color: C.slate, marginTop: 16, maxWidth: 720 }}>
                One brand turned a handful of posts into the <span style={{ fontStyle: 'italic', color: C.orangeDeep }}>most reach</span> of the tournament.
              </div>
            </div>

            {/* hero — Hisense + the one number */}
            <div style={{ marginTop: 40, display: 'flex', alignItems: 'center', gap: 30, position: 'relative' }}>
              <Tile brand={hisense} size={108} radius={26} />
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <span style={{ fontFamily: F.sans, fontWeight: 700, fontSize: 40, letterSpacing: '-0.02em', color: C.ink }}>Hisense</span>
                  <Move move="new" size={26} />
                </div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginTop: 4 }}>
                  <span style={{ fontFamily: F.serif, fontWeight: 500, fontSize: 110, lineHeight: 0.9, letterSpacing: '-0.04em', color: C.orangeDeep, fontVariantNumeric: 'tabular-nums' }}>116.4<span style={{ fontSize: 52, color: C.orange }}>K</span></span>
                  <span style={{ fontFamily: F.mono, fontSize: 13, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: C.muted, lineHeight: 1.4 }}>avg views<br />per post</span>
                </div>
              </div>
            </div>

            {/* proof bars */}
            <div style={{ marginTop: 38, display: 'flex', flexDirection: 'column', gap: 14, position: 'relative' }}>
              {BARS.map(b => <RaceBar key={b.name} {...b} />)}
            </div>

            {/* why it worked — patterns straight from Scolto's enrichment of the top posts */}
            <div style={{ marginTop: 56, position: 'relative' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 26 }}>
                <Eyebrow size={12}>Why — what the top posts have in common</Eyebrow>
                <div style={{ flex: 1, height: 1, background: C.rule }} />
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
                <Reason n="1"><Hot>97%</Hot> of its reach was earned — not posted.</Reason>
                <Reason n="2">It rode the biggest moments: <Hot>Vozinha, Messi</Hot>.</Reason>
                <Reason n="3">Its <Hot>stadium big-screens</Hot> stayed in the shot.</Reason>
              </div>
            </div>

            {/* footer */}
            <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingTop: 16, borderTop: `1px solid ${C.rule}`, position: 'relative' }}>
              <Eyebrow size={11} color={C.muted}>World Cup 2026 · 313M views analysed</Eyebrow>
              <span style={{ fontFamily: F.mono, fontSize: 11.5, color: C.muted, letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>
                Tracked by Scolto · <span style={{ fontWeight: 600, color: C.orangeDeep }}>scolto.com</span>
              </span>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<Card />);

      // ── Download as PNG (2× = 2160×3000, retina-crisp) ──
      const btn = document.createElement('button');
      btn.id = 'dl-btn';
      btn.textContent = '↓ Download PNG';
      document.body.appendChild(btn);
      btn.addEventListener('click', async () => {
        const node = document.getElementById('card');
        if (!node || !window.htmlToImage) return;
        btn.disabled = true; btn.textContent = 'Rendering…';
        try {
          // Wait for fonts + images so nothing exports half-loaded.
          if (document.fonts && document.fonts.ready) await document.fonts.ready;
          await Promise.all([...node.querySelectorAll('img')].map(img =>
            img.complete ? Promise.resolve() : new Promise(r => { img.onload = img.onerror = r; })));
          const dataUrl = await window.htmlToImage.toPng(node, {
            pixelRatio: 2, cacheBust: true,
            width: 1080, height: 1350,
            style: { boxShadow: 'none', margin: '0' },
          });
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'hisense-efficiency-post.png';
          a.click();
        } catch (e) {
          alert('Export failed: ' + (e && e.message ? e.message : e) + '\n(Make sure the page is opened via http://localhost, not file://)');
        } finally {
          btn.disabled = false; btn.textContent = '↓ Download PNG';
        }
      });
    }
    if (document.readyState === 'loading') window.addEventListener('DOMContentLoaded', Mount);
    else Mount();
  </script>
</body>
</html>
